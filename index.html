<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Brainrot Heist</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%; overflow: hidden; background: #0b0f1a; font-family: system-ui, sans-serif;
        /* kill Android browser gestures: scroll, pinch-zoom, pull-to-refresh, long-press selection */
        touch-action: none;
        -webkit-user-select: none; user-select: none;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
      }
      #app { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; touch-action: none; }
      #ui { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
      #ui > * { pointer-events: auto; }

      /* temporary M2 controls hint */
      #controls-hint {
        position: fixed; left: 14px; bottom: 14px; z-index: 11;
        color: #c4d0ec; font-size: 13px; line-height: 1.6; opacity: .8;
        text-shadow: 0 1px 2px rgba(0,0,0,.6); pointer-events: none;
      }
      #controls-hint b { color: #fff; }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="ui"></div>
    <div id="controls-hint">
      <b>WASD</b> move &nbsp; <b>Space</b> jump / double-jump &nbsp; <b>Shift</b> sprint &nbsp; <b>F</b> dash &nbsp; <b>drag</b> rotate camera
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
